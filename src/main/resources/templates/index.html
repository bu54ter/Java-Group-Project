<html xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{layout :: head}"></head>

<body>

	<div th:replace="~{layout :: heroSection}"></div>
	<div th:replace="~{layout :: nav('Home')}"></div>
	<div sec:authorize="not isAuthenticated()">
		<div th:replace="~{layout :: loginModal}"></div>
	</div>
	<section class="div2">
		<h1>Croeso</h1>
		<p>This website is designed to help students learn new Welsh nouns
			and test their knowledge.</p>
		<hr />
		<div th:if="${wordOfTheDay != null}" id="nounCard">
			<div class="noun-badge">Gair y Dydd</div>
			<div class="noun-content">
				<h2 class="welsh-word" th:text="${wordOfTheDay.welshWord}"></h2>
				<h3 class="english-translation">
					: <span th:text="${wordOfTheDay.englishWord}"></span>
				</h3>
				<p class="noun-details">
					<span class="gender-tag"
						th:text="${wordOfTheDay.gender.name() == 'MASCULINE' ? 'Masculine' : 'Feminine'}"></span>
					<br /> <span class="sentence-section"> <strong>Example:</strong><br />
						<span class="sentence-welsh" th:text="${wordOfTheDay.welshSent}"></span><br />
						<i class="sentence-english" th:text="${wordOfTheDay.englishSent}"></i>
					</span>
				</p>
			</div>
		</div>

		<div th:if="${wordOfTheDay == null}">
			<p>No nouns available.</p>
		</div>

		<hr>
		<section class="div1">
			<div th:replace="~{layout :: footer}"></div>
			<div th:replace="~{layout :: scripts}"></div>
		</section>
	</section>

	<script th:if="${param.error}">
		document.addEventListener("DOMContentLoaded", function () {
			document.getElementById('loginModal').style.display = 'block';
		});
	</script>
</body>

</html>
