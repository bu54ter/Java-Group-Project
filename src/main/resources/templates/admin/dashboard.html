<html xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{layout :: head}"></head>
<!-- CSS link removed from this file because it should now be inside layout.html head fragment -->

<body>

	<div th:replace="~{layout :: nav('AdminDashboard')}"></div>
	<div sec:authorize="not isAuthenticated()">
		<!-- Updated to Thymeleaf full fragment syntax -->
		<div th:replace="~{layout :: loginModal}"></div>
	</div>

	<section class="div1">
		<h2>Active users</h2>

		<div th:if="${resetPasswordError}" class="error-message"
			th:text="${resetPasswordError}"></div>

		<div th:if="${resetPasswordSuccess}" class="success-message"
			th:text="${resetPasswordSuccess}"></div>
<div th:if="${deleteUserError}" class="error-message" th:text="${deleteUserError}"></div>
		<!-- Updated to Thymeleaf full fragment syntax -->
		<div th:replace="~{layout :: newUserModal}"></div>
		<br>

		<table>
			<tr>
				<th>ID</th>
				<th>Username</th>
				<th>Role</th>
				<th>First Name</th>
				<th>Surname</th>
				<th>Date Created</th>
				<th>Reset Password</th>
				<th>Delete User</th>
			</tr>

			<tr th:each="u : ${users}">
				<td th:text="${u.userId}"></td>
				<td th:text="${u.username}"></td>
				<td th:text="${u.role}"></td>
				<td th:text="${u.firstname}"></td>
				<td th:text="${u.surname}"></td>
				<td th:text="${u.createdAt}"></td>
				<td>
					<!-- Reset password form with:
					     1. eye icon to show or hide password
					     2. role-based minimum length hint
					     3. two-step re-enter password check
					     all kept inside the same table cell -->
					<form th:action="@{/users/{id}/reset-password(id=${u.userId})}"
						method="post" class="resetpwd"
						onsubmit="return handleResetPasswordSubmit(this)">
						<input type="hidden" th:name="${_csrf.parameterName}"
							th:value="${_csrf.token}" />

						<!-- Tracks whether the reset form is on the first entry or re-enter step -->
						<input type="hidden" name="confirmStep" value="false"
							class="confirm-step">

						<!-- Temporarily stores the first password entry for front-end comparison -->
						<input type="hidden" name="firstPasswordEntry" value=""
							class="first-password-entry">

						<div class="password-input-wrapper">
							<input type="password" name="newPassword" required
								class="reset-password-input"
								th:attr="data-role=${u.role.name()}" placeholder="New password">
							<button type="button" class="toggle-password-btn"
								onclick="togglePassword(this)" aria-label="Show password"
								title="Show password">👁</button>
						</div>

						<button type="submit" class="smlbtn reset-password-btn">Reset
							password</button>
					</form>
				</td>
				<td>
					<form th:action="@{/users/{id}/delete(id=${u.userId})}"
						method="post" style="display: inline;">
						<input type="hidden" th:name="${_csrf.parameterName}"
							th:value="${_csrf.token}" />
						<button type="submit" class="smlbtn"
							onclick="return confirm('Delete this user?')">Delete</button>
					</form>
				</td>
			</tr>
		</table>

		<br>
		<hr>

		<h2>Deleted Users</h2>
		<table>
			<tr>
				<th>ID</th>
				<th>Username</th>
				<th>Role</th>
				<th>First Name</th>
				<th>Surname</th>
				<th>Date Deleted</th>
				<th>Undo Delete</th>
			</tr>
			<tr th:each="ud : ${deletedUsers}">
				<td th:text="${ud.userId}"></td>
				<td th:text="${ud.username}"></td>
				<td th:text="${ud.role}"></td>
				<td th:text="${ud.firstname}"></td>
				<td th:text="${ud.surname}"></td>
				<td th:text="${ud.deletedAt}"></td>
				<td>
					<form th:action="@{/userDeleted/{id}/undelete(id=${ud.userId})}"
						method="post" style="display: inline;">
						<input type="hidden" th:name="${_csrf.parameterName}"
							th:value="${_csrf.token}" />
						<button type="submit" class="smlbtn"
							onclick="return confirm('Restore this user?')">Undelete
						</button>
					</form>
				</td>
			</tr>
		</table>
		<hr>

		<!-- Updated to Thymeleaf full fragment syntax -->
		<div th:replace="~{layout :: footer}"></div>
		<!-- Updated to Thymeleaf full fragment syntax -->
		<div th:replace="~{layout :: scripts}"></div>

	</section>
</body>

</html>
