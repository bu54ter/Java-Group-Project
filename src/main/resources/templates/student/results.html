<html xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<link rel="stylesheet" th:href="@{/style.css}">
<body>
	<div th:replace="layout :: heroSection50"></div>
	<div th:replace="layout :: nav"></div>
	<div sec:authorize="not isAuthenticated()">
		<div th:replace="layout :: loginModal"></div>
	</div>
	<section class="div1">
		<h2>Student</h2>
		<p>
			<strong>Test ID:</strong> <span th:text="${test.testId}"></span>
		</p>
		<p>
			<strong>Date Taken:</strong> <span
				th:text="${#temporals.format(test.testedAt, 'dd MMM yyyy HH:mm')}"></span>
		</p>
		<hr>
		<h2>Your Score</h2>
		<p>
			<strong th:text="${test.score}"></strong> %
		</p>
		<p th:if="${test.score >= 70}">🎉 Well done!</p>

		<p th:if="${test.score < 70}">📘 Keep practicing!</p>

		<br> <a th:href="@{/student/dashboard}" class="loginbtn">back
			to dash board</a>


		<hr>
		<div th:replace="layout :: footer"></div>
		<div th:replace="layout :: scripts"></div>

	</section>
</body>


</html>
</html>
