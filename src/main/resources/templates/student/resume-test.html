<!-- Root HTML element with Thymeleaf and Spring Security namespaces -->
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<!-- Injects shared <head> content from layout -->
<head th:replace="~{layout :: head}"></head>

<!-- Page-specific stylesheet -->
<link rel="stylesheet" th:href="@{/style.css}">

<body>

	<!-- Injects navigation bar fragment; sets Test as active page -->
	<div th:replace="~{layout :: nav('Test')}"></div>

	<!-- Conditional rendering: login modal shown only when user is not authenticated -->
	<div sec:authorize="not isAuthenticated()">
		<div th:replace="~{layout :: loginModal}"></div>
	</div>


	<section class="div2">

		<!-- Page heading for interrupted test state -->
		<h2>Unsubmitted Test Found</h2>
		<hr>

		<!-- Warning banner when user is blocked from revision due to active test -->
		<div th:if="${blockedFrom == 'revision'}"
			style="background: #fff3cd; border: 1px solid #ffc107; padding: 0.75rem 1rem; margin-bottom: 1rem; border-radius: 4px; color: #533f03;">
			Revision is unavailable while a test is in progress. Please complete
			or start a new test first.</div>

		<!-- Displays date of existing unsubmitted test -->
		<p>
			You have an unsubmitted test from <strong th:text="${testDate}"></strong>.
		</p>

		<!-- Explains available user actions -->
		<p>Your progress has been saved. Continue where you left off, or
			start a fresh test.</p>

		<!-- Cooldown notice: prevents immediate new test creation -->
		<div th:if="${cooldownSeconds != null}" id="cooldown-notice"
			style="background: #fff3cd; border: 1px solid #ffc107; padding: 0.75rem 1rem; margin-bottom: 1rem; border-radius: 4px; color: #533f03;">
			You must wait <strong id="cooldown-display"></strong> before starting
			a new test.
		</div>

		<br>

		<!-- Action buttons for continuing or starting a test -->
		<div class="button-container">

			<!-- Link to resume existing test -->
			<a th:href="@{/student/test/continue}" class="button">Continue
				Test</a>

			<!-- Form to start a new test:
                 - POST request
                 - CSRF protected
                 - Disabled when cooldown is active -->
			<form method="post" th:action="@{/student/test/new}"
				style="display: contents;" id="new-test-form">

				<!-- CSRF protection token -->
				<input type="hidden" th:name="${_csrf.parameterName}"
					th:value="${_csrf.token}" />

				<!-- Submit new test request -->
				<button type="submit" class="button" id="new-test-btn"
					th:disabled="${cooldownSeconds != null}">Start New Test</button>
			</form>
		</div>

		<!-- Hidden input used by JS to drive cooldown countdown logic -->
		<input type="hidden" id="cooldown-seconds"
			th:if="${cooldownSeconds != null}" th:value="${cooldownSeconds}">
		<hr>

		<!-- Injects shared footer fragment -->
		<div th:replace="~{layout :: footer}"></div>

		<!-- Injects shared JavaScript used across the application -->
		<div th:replace="~{layout :: scripts}"></div>
	</section>
</body>

</html>
