<html xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<link rel="stylesheet" th:href="@{/style.css}">
<body>

	<div th:replace="layout :: header"></div>
	<div sec:authorize="not isAuthenticated()">
		<div th:replace="layout :: loginModal"></div>
	</div>
	<div sec:authorize="isAuthenticated()">
		<div th:replace="layout :: userDetails"></div>
	</div>
	<div sec:authorize="isAuthenticated()">
		<div th:replace="layout :: logout"></div>
	</div>
	<h2>Student Dashboard</h2>
	<hr>
	<h3>Show Studnet Stats.</h3>
	<hr>
	<a th:href="@{/student/dashboard}">
        <button type="button">Take a Test</button>
    </a>
    <hr>
	<p>
		Jobs to do: <br /> As a Student, I must be able to take a test. <br />
		As a Student, I must not be able to edit my answers once submitted. <br />
		As a Student, I must be shown my results for a test. <br /> As a
		Student, I should be able to view all of my test results. <br />
	<p />

	<hr>
	<div th:replace="layout :: nav"></div>
	<hr>
	<div th:replace="layout :: footer"></div>
	<div th:replace="layout :: scripts"></div>
</body>
</html>
</html>
