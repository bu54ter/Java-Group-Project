<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{layout :: head}"></head>

<body>

    <div th:replace="~{layout :: nav('LecturerDashboard')}"></div>

    <div sec:authorize="not isAuthenticated()">
        <div th:replace="~{layout :: loginModal}"></div>
    </div>

    <section class="div1">
        <h2>Lecturer Dashboard</h2>
        <hr>

        <h2>Active nouns</h2>
        <div th:replace="~{layout :: newNounModal}"></div>
        <br>

        <table>
            <tr>
                <th>ID</th>
                <th>Welsh noun</th>
                <th>English noun</th>
                <th>Gender</th>
                <th>Date added</th>
                <th>Added by</th>
                <th>Edited by</th>
                <th>Welsh sentence</th>
                <th>English sentence</th>
                <th>Edit</th>
                <th>Delete</th>
            </tr>

            <tr th:each="n : ${nouns}">
                <td th:text="${n.nounId}"></td>
                <td th:text="${n.welshWord}"></td>
                <td th:text="${n.englishWord}"></td>
                <td th:text="${n.gender}"></td>
                <td th:text="${n.createdAt}"></td>
                <td th:text="${n.createdBy}"></td>
                <td th:text="${n.editedBy}"></td>
                <td th:text="${n.welshSent}"></td>
                <td th:text="${n.englishSent}"></td>

                <td>
                    <button type="button"
                            class="smlbtn"
                            th:attr="
                                data-id=${n.nounId},
                                data-welsh=${n.welshWord},
                                data-english=${n.englishWord},
                                data-welshsent=${n.welshSent},
                                data-englishsent=${n.englishSent},
                                data-gender=${n.gender}"
                            onclick="openEdit(this)">
                        Edit
                    </button>
                </td>

                <td>
                    <form th:action="@{/nouns/{id}/delete(id=${n.nounId})}"
                          method="post"
                          style="display:inline;">
                        <input type="hidden"
                               th:name="${_csrf.parameterName}"
                               th:value="${_csrf.token}" />
                        <button type="submit"
                                class="smlbtn"
                                onclick="return confirm('Delete this noun?')">
                            Delete
                        </button>
                    </form>
                </td>
            </tr>
        </table>

        <br>
        <hr>

        <h2>Deleted nouns (not used in tests)</h2>

        <table>
            <tr>
                <th>ID</th>
                <th>Welsh noun</th>
                <th>English noun</th>
                <th>Gender</th>
                <th>Date added</th>
                <th>Added by</th>
                <th>Welsh sentence</th>
                <th>English sentence</th>
                <th>Date deleted</th>
                <th>Deleted by</th>
            </tr>

            <tr th:each="nd : ${nounsDeleted}">
                <td th:text="${nd.nounId}"></td>
                <td th:text="${nd.welshWord}"></td>
                <td th:text="${nd.englishWord}"></td>
                <td th:text="${nd.gender}"></td>
                <td th:text="${nd.createdAt}"></td>
                <td th:text="${nd.createdBy}"></td>
                <td th:text="${nd.welshSent}"></td>
                <td th:text="${nd.englishSent}"></td>
                <td th:text="${nd.deletedAt}"></td>
                <td th:text="${nd.deletedBy}"></td>
            </tr>
        </table>

        <div th:replace="~{layout :: editNounModal}"></div>

        <hr>
        <div th:replace="~{layout :: footer}"></div>
        <div th:replace="~{layout :: scripts}"></div>
    </section>

    <script>
        function openEdit(button) {
            const id = button.getAttribute('data-id');
            const welshWord = button.getAttribute('data-welsh');
            const englishWord = button.getAttribute('data-english');
            const welshSent = button.getAttribute('data-welshsent');
            const englishSent = button.getAttribute('data-englishsent');
            const gender = button.getAttribute('data-gender');

            document.getElementById('editNounForm').action = '/nouns/' + id + '/update';
            document.getElementById('editWelshWord').value = welshWord || '';
            document.getElementById('editEnglishWord').value = englishWord || '';
            document.getElementById('editWelshSent').value = welshSent || '';
            document.getElementById('editEnglishSent').value = englishSent || '';

            document.getElementById('editGenderMasculine').checked = (gender === 'MASCULINE');
            document.getElementById('editGenderFeminine').checked = (gender === 'FEMININE');

            document.getElementById('editNounModal').style.display = 'block';
        }
    </script>

</body>
</html>
