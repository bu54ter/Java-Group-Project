<!-- Root HTML element with Thymeleaf and Spring Security namespaces -->
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<!-- Injects shared <head> content from layout -->
<head th:replace="~{layout :: head}"></head>

<body>
	<!-- Injects navigation bar fragment; sets Results as active page -->
	<div th:replace="~{layout :: nav('Results')}"></div>
	<!-- Conditional rendering: login modal shown only when user is not authenticated -->
	<div sec:authorize="not isAuthenticated()">
		<div th:replace="~{layout :: loginModal}"></div>
	</div>

	<section class="div2">
		<!-- Page context header for result view -->
		<h2>Student</h2>
		<p>
			<!-- Displays test identifier -->
			<strong>Test ID:</strong> <span th:text="${test.testId}"></span>
		</p>
		<p>
			<!-- Displays formatted test timestamp -->
			<strong>Date Taken:</strong> <span
				th:text="${#temporals.format(test.testedAt, 'dd MMM yyyy HH:mm')}"></span>
		</p>

		<hr>
		<!-- Score summary section -->
		<h2>Your Score</h2>
		<p>
			<strong th:text="${test.score}"></strong> %
		</p>
		<!-- Conditional feedback based on performance threshold -->
		<p th:if="${test.score >= 70}">Well done!</p>
		<p th:if="${test.score < 70}">Keep practising!</p>

		<hr />

		<br>
		<!-- Navigation back to dashboard -->
		<a th:href="@{/student/dashboard}" class="button">Back to
			Dashboard</a>

		<hr>
		<!-- Injects shared footer fragment -->
		<div th:replace="~{layout :: footer}"></div>
		<!-- Injects shared JavaScript used across the application -->
		<div th:replace="~{layout :: scripts}"></div>

	</section>

</body>

</html>
