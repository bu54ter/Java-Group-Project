<html xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{layout :: head}"></head>

<body>

	<div th:replace="~{layout :: nav('Results')}"></div>
	<div sec:authorize="not isAuthenticated()">
		<div th:replace="~{layout :: loginModal}"></div>
	</div>

	<section class="div2">
		<h2>Student</h2>
		<p>
			<strong>Test ID:</strong> <span th:text="${test.testId}"></span>
		</p>
		<p>
			<strong>Date Taken:</strong>
			<span th:text="${#temporals.format(test.testedAt, 'dd MMM yyyy HH:mm')}"></span>
		</p>

		<hr>

		<h2>Your Score</h2>
		<p>
			<strong th:text="${test.score}"></strong> %
		</p>
		<p th:if="${test.score >= 70}">🎉 Well done!</p>
		<p th:if="${test.score < 70}">📘 Keep practicing!</p>

		<hr />

		<br>
		<a th:href="@{/student/dashboard}" class="button">Back to Dashboard</a>

		<hr>
		<div th:replace="~{layout :: footer}"></div>
		<div th:replace="~{layout :: scripts}"></div>

	</section>

</body>

</html>
